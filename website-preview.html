<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ICBD-2026 Markdown Preview</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0b0f19;
        --panel: #0f172a;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --border: rgba(148, 163, 184, 0.2);
        --link: #60a5fa;
        --code-bg: rgba(148, 163, 184, 0.15);
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f8fafc;
          --panel: #ffffff;
          --text: #0f172a;
          --muted: #475569;
          --border: rgba(15, 23, 42, 0.12);
          --link: #2563eb;
          --code-bg: rgba(15, 23, 42, 0.06);
        }
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
          Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      }
      header {
        position: sticky;
        top: 0;
        backdrop-filter: blur(10px);
        background: color-mix(in srgb, var(--bg), transparent 25%);
        border-bottom: 1px solid var(--border);
        z-index: 5;
      }
      .bar {
        max-width: 980px;
        margin: 0 auto;
        padding: 14px 16px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .title {
        font-weight: 700;
      }
      .pill {
        font-size: 12px;
        color: var(--muted);
        border: 1px solid var(--border);
        padding: 4px 8px;
        border-radius: 999px;
        white-space: nowrap;
      }
      main {
        max-width: 980px;
        margin: 0 auto;
        padding: 22px 16px 60px;
      }
      article {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 22px 22px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.18);
      }
      a {
        color: var(--link);
      }
      pre,
      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
      }
      code {
        background: var(--code-bg);
        padding: 2px 6px;
        border-radius: 6px;
      }
      pre {
        background: var(--code-bg);
        padding: 14px 16px;
        border-radius: 12px;
        overflow: auto;
      }
      pre code {
        background: transparent;
        padding: 0;
      }
      h1,
      h2,
      h3 {
        scroll-margin-top: 84px;
      }
      hr {
        border: none;
        border-top: 1px solid var(--border);
        margin: 22px 0;
      }
      .status {
        margin-left: auto;
        font-size: 12px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <header>
      <div class="bar">
        <div class="title">Markdown website preview</div>
        <div class="pill" id="filePill">BACKEND_OPTIMIZATION_SUMMARY.md</div>
        <div class="status" id="status">Loading…</div>
      </div>
    </header>
    <main>
      <article id="content"></article>
    </main>

    <script type="module">
      // Simple website-style markdown renderer.
      // Uses a CDN so there are no local dependencies.
      const mdPath = "BACKEND_OPTIMIZATION_SUMMARY.md";

      const statusEl = document.getElementById("status");
      const contentEl = document.getElementById("content");
      const filePillEl = document.getElementById("filePill");
      filePillEl.textContent = mdPath;

      async function load() {
        try {
          statusEl.textContent = "Fetching markdown…";
          const res = await fetch(mdPath, { cache: "no-store" });
          if (!res.ok) throw new Error(`Failed to fetch ${mdPath} (${res.status})`);
          const md = await res.text();

          statusEl.textContent = "Rendering…";
          const { marked } = await import(
            "https://cdn.jsdelivr.net/npm/marked@15.0.7/lib/marked.esm.js"
          );
          marked.setOptions({ gfm: true, breaks: false });
          contentEl.innerHTML = marked.parse(md);

          statusEl.textContent = "Ready";
        } catch (err) {
          statusEl.textContent = "Error";
          contentEl.innerHTML = `<p><strong>Could not render preview.</strong></p>
<pre>${String(err?.stack || err)}</pre>
<p>Tip: if the network is blocked, we can switch to a fully offline renderer.</p>`;
        }
      }

      load();
    </script>
  </body>
</html>
